services:
  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATA_DIR: /workspace/data
      CORS_ORIGINS: http://localhost:3000
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./data:/workspace/data
    ports:
      - "8000:8000"
    depends_on:
      - ollama

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  ollama:
